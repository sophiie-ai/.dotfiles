# vim: set ft=tmux:

# === Sensible Defaults ===
set -s escape-time 0
set -g history-limit 50000
set -g display-time 4000
set -g status-interval 5
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"

# Extended keys for modifier support (Shift+Enter, Ctrl+Shift, etc.)
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

# Emacs keys in command prompt (better than vi for this context)
set -g status-keys emacs

# Focus events for terminals that support them
set -g focus-events on

# Aggressive resize for multi-monitor
setw -g aggressive-resize on

# === Prefix ===
unbind C-b
set -g prefix C-a
bind a send-prefix

# === Mouse ===
set -g mouse on

# === Window & Pane ===
# Start numbering at 1
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Split panes with current path
unbind %
unbind '"'
bind \\ split-window -h -c "#{pane_current_path}"
bind Enter split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Pane resizing (repeatable)
bind -r - resize-pane -D 2
bind -r = resize-pane -U 2
bind -r ] resize-pane -R 2
bind -r [ resize-pane -L 2

# Maximize pane
unbind z
bind m resize-pane -Z

# Kill pane
bind x kill-pane

# === Copy Mode (vim-style) ===
set-window-option -g mode-keys vi
bind v copy-mode
bind -T copy-mode-vi q send-keys -X cancel
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi V send-keys -X select-line
bind -T copy-mode-vi Escape send-keys -X clear-selection
bind -T copy-mode-vi 'C-v' send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# === Status Bar ===
set-option -g status-position top

# === Reload Config ===
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# === Plugins (TPM) ===
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'

# Session persistence
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-capture-pane-contents 'on'

set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '10'

# Plugin directory
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.config/tmux/plugins'

# Auto-install TPM if not present
if "test ! -d ~/.config/tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm && ~/.config/tmux/plugins/tpm/bin/install_plugins'"

# Initialize TPM (must be last line)
run '~/.config/tmux/plugins/tpm/tpm'
